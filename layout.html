<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demostración de Estructura - SergioDev</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg sticky-top bg-white border-bottom border-dark shadow-sm py-2">
        <section class="container-fluid px-4">
            <a class="nav-link fw-bold text-dark d-flex align-items-center" href="index.html">
                <i class="fas fa-arrow-left me-2"></i> VOLVER AL PORTAFOLIO
            </a>
            <span class="navbar-text ms-auto font-monospace small text-secondary d-none d-md-block">
                EXPERIMENTO ESTRUCTURAL #01
            </span>
        </section>
    </nav>

    <main>
        <!-- Structural Layout Demo Section (Cero DIVs) -->
        <section id="layout" class="layout-demo-section py-5">
            <section class="container">
                <header class="text-center mb-3 fade-in-up">
                    <h1 class="h2 fw-800 title-font mb-2">PROTOTIPADO SEMÁNTICO</h1>
                    <p class="text-secondary font-monospace italic">Estructura pura basada en referencia visual (Criterio: Cero DIVs)</p>
                </header>
                
                <section class="structural-outer fade-in-up shadow-lg">
                    
                    <!-- BLOQUE 1: Vertical Stack -->
                    <article class="box-wrapper mb-3">
                        <article class="box-inner bg-green-light">CAJA</article>
                        <article class="box-inner bg-blue-light">CAJA</article>
                        <article class="box-inner bg-yellow-light vh-large">CAJA</article>
                    </article>

                    <!-- BLOQUE 2: Split 50/50 -->
                    <article class="row g-0 mb-3 border border-dark border-opacity-25">
                        <article class="col-md-6 border-end border-dark border-opacity-25">
                            <article class="box-inner bg-peach-light vh-large border-red">CAJA</article>
                        </article>
                        <aside class="col-md-6">
                            <article class="box-inner bg-peach-light border-cyan">CAJA</article>
                            <article class="box-inner bg-peach-light vh-small border-cyan">CAJA</article>
                            <article class="box-inner bg-peach-light vh-small border-cyan">CAJA</article>
                        </aside>
                    </article>

                    <!-- BLOQUE 3: Split 70/30 -->
                    <article class="row g-0 mb-3 border border-dark border-opacity-25">
                        <article class="col-md-7 border-end border-dark border-opacity-25">
                            <article class="box-inner bg-blue-light vh-large border-red">CAJA</article>
                        </article>
                        <aside class="col-md-5">
                            <article class="box-inner bg-blue-light border-blue flex-fill" style="min-height: 80px;">CAJA</article>
                            <article class="box-inner bg-blue-light border-blue flex-fill" style="min-height: 80px;">CAJA</article>
                        </aside>
                    </article>

                    <!-- BLOQUE 4: Footer-like Grid -->
                    <article class="box-wrapper rounded-0">
                        <header class="box-inner bg-indigo-light border-red">CAJA</header>
                        <article class="row g-0 border-top border-bottom border-dark border-opacity-25">
                            <article class="col-6 col-md-3 border-end border-dark border-opacity-25"><article class="box-inner bg-green-light">CAJA</article></article>
                            <article class="col-6 col-md-3 border-end border-dark border-opacity-25"><article class="box-inner bg-green-light">CAJA</article></article>
                            <article class="col-6 col-md-3 border-end border-dark border-opacity-25"><article class="box-inner bg-green-light">CAJA</article></article>
                            <article class="col-6 col-md-3"><article class="box-inner bg-green-light">CAJA</article></article>
                        </article>
                        <footer class="box-inner bg-green-light border-red">CAJA</footer>
                    </article>

                </section>
            </section>
        </section>
    </main>

    <footer class="py-5 bg-white border-top border-dark text-center">
        <p class="text-secondary small font-monospace">&copy; 2026 SERGIODEV - EXPERIMENTOS DE CÓDIGO</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
